{% extends 'base.html' %}
{% block title %}Профиль{% endblock %}

{% block content %}
<h1>Профиль</h1>

<table>
    <tr><th>Логин</th>     <td>{{ user.username }}</td></tr>
    <tr><th>Роль</th>      <td>{{ user.role }}</td></tr>
    <tr><th>Регистрация</th><td>{{ user.created_at[:10] }}</td></tr>
    <tr><th>Записей</th>   <td>{{ records_count }}</td></tr>
</table>

<h2>Сменить пароль</h2>
<form method="POST">
    <input type="password" name="password" placeholder="Новый пароль" required>
    <button type="submit">Сохранить</button>
</form>
{% endblock %}
