{% extends 'base.html' %}
{% block title %}Профиль{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Профиль</h1>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-header"><h2>Информация</h2></div>
    <div class="card-body">
      <table class="data-table">
        <tbody>
          <tr>
            <td><strong>Логин</strong></td>
            <td>{{ user.username }}</td>
          </tr>
          <tr>
            <td><strong>Роль</strong></td>
            <td><span class="badge {{ user.role }}">{{ user.role }}</span></td>
          </tr>
          <tr>
            <td><strong>Регистрация</strong></td>
            <td>{{ user.created_at[:10] }}</td>
          </tr>
          <tr>
            <td><strong>Записей</strong></td>
            <td>{{ records_count }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><h2>Сменить пароль</h2></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group" style="margin-bottom:1rem">
          <label>Новый пароль</label>
          <input type="password" name="password"
                 placeholder="Минимум 6 символов" required>
          <span class="hint">Минимум 6 символов</span>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
